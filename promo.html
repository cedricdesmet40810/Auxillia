<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auxilia — Promovideo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body{margin:0;overflow:hidden;background:#0a0a0a;}
  /* embed-modus: geen afspeelbalk, kale film voor inline gebruik op de site */
  body.embed #root > div > div:last-child{display:none!important;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel">
/* ─── Auxilia promo · 40s · 1920×1080 ──────────────────────────────────── */
const C = {
  sand:"#FAF7F2", sandDeep:"#F1EADE", paper:"#FFFFFF",
  teal:"#0F5C5A", tealDark:"#0B4543", clay:"#D2691E", claySoft:"#F4DEC8",
  ink:"#1C2422", inkSoft:"#52605C", inkFaint:"#8A968F",
  line:"rgba(28,36,34,.12)",
};
const SERIF = '"Spectral", Georgia, serif';
const SANS  = '"Hanken Grotesk", system-ui, sans-serif';

/* ── brand mark: two independently animatable chevrons ── */
function ChevTop({size, color, sw=7.2, style}){
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" style={{position:"absolute", left:0, top:0, ...style}}>
      <path d="M14 31 L32 14 L50 31" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"></path>
    </svg>
  );
}
function ChevBottom({size, color, sw=7.2, style}){
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" style={{position:"absolute", left:0, top:0, ...style}}>
      <path d="M14 50 L32 33 L50 50" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"></path>
    </svg>
  );
}
function RankMark({size=64, top=C.teal, bottom=C.clay, sw=7.2, style}){
  return (
    <div style={{position:"relative", width:size, height:size, flex:"0 0 auto", ...style}}>
      <ChevTop size={size} color={top} sw={sw} />
      <ChevBottom size={size} color={bottom} sw={sw} />
    </div>
  );
}

/* ════ Scene 1 · De ruis (0 – 6.5) ════ */
const noiseWords = [
  {tx:"Moet je iets met AI?", x:280,  y:250, s:46, d:0.2, o:0.55, c:C.ink},
  {tx:"ChatGPT?",             x:1390, y:215, s:58, d:0.6, o:0.34, c:C.ink},
  {tx:"tools",                x:1530, y:740, s:42, d:1.0, o:0.30, c:C.ink},
  {tx:"agents?",              x:250,  y:790, s:50, d:1.3, o:0.40, c:C.ink},
  {tx:"waar beginnen?",       x:850,  y:170, s:42, d:1.6, o:0.50, c:C.clay},
  {tx:"automatisering",       x:1170, y:570, s:48, d:0.9, o:0.32, c:C.ink},
  {tx:"hype?",                x:540,  y:545, s:40, d:1.9, o:0.28, c:C.ink},
  {tx:"nog een tool?",        x:1400, y:435, s:40, d:2.2, o:0.40, c:C.ink},
  {tx:"chatbots",             x:660,  y:880, s:46, d:2.4, o:0.34, c:C.teal},
  {tx:"de AI Act?",           x:1120, y:865, s:38, d:2.7, o:0.36, c:C.ink},
];
function SceneNoise(){
  return (
    <Sprite start={0} end={6.5}>
      {({localTime:t}) => {
        const zoom = animate({from:1, to:1.06, start:0, end:6.5, ease:Easing.linear})(t);
        const scatter = animate({from:0, to:1, start:4.5, end:6.0, ease:Easing.easeInCubic})(t);
        const hookIn  = animate({from:0, to:1, start:4.7, end:5.4, ease:Easing.easeOutCubic})(t);
        const hookOut = animate({from:1, to:0, start:6.1, end:6.5, ease:Easing.easeInCubic})(t);
        return (
          <div style={{position:"absolute", inset:0, background:C.sand}}>
            <div style={{position:"absolute", inset:0, transform:`scale(${zoom})`, transformOrigin:"center"}}>
              {noiseWords.map((w,i) => {
                const inOp = animate({from:0, to:w.o, start:w.d, end:w.d+0.7, ease:Easing.easeOutCubic})(t);
                const drift = t * 9 * (i%2===0 ? 1 : 0.6);
                const dx = (w.x - 960) * 0.55 * scatter;
                const dy = (w.y - 540) * 0.55 * scatter;
                return (
                  <div key={i} style={{
                    position:"absolute", left:w.x, top:w.y - drift,
                    transform:`translate(${dx}px, ${dy}px) rotate(${(i%3-1)*2}deg)`,
                    opacity: inOp * (1 - scatter),
                    fontFamily:SERIF, fontWeight:500, fontSize:w.s, color:w.c,
                    whiteSpace:"nowrap",
                  }}>{w.tx}</div>
                );
              })}
            </div>
            <div style={{
              position:"absolute", left:"50%", top:"50%",
              transform:`translate(-50%,-50%) translateY(${(1-hookIn)*26}px)`,
              opacity: hookIn * hookOut,
              fontFamily:SERIF, fontWeight:500, fontSize:72, color:C.ink,
              letterSpacing:"-0.02em", textAlign:"center", width:1400, lineHeight:1.15, whiteSpace:"nowrap",
            }}>Iedereen zegt dat je <em style={{fontStyle:"normal", color:C.teal}}>iets met AI</em> moet.</div>
          </div>
        );
      }}
    </Sprite>
  );
}

/* ════ Scene 2 · De versterking komt (6.5 – 12.5) ════ */
function SceneMark(){
  const M = 300;
  return (
    <Sprite start={6.5} end={12.5}>
      {({localTime:t}) => {
        const topY    = animate({from:-560, to:0, start:0.2, end:1.05, ease:Easing.easeOutCubic})(t);
        const botY    = animate({from: 560, to:0, start:0.55, end:1.5, ease:Easing.easeOutBack})(t);
        const pulse   = 1 + 0.05 * Math.sin(clamp((t-1.5)/0.5,0,1) * Math.PI);
        const wordIn  = animate({from:0, to:1, start:1.9, end:2.6, ease:Easing.easeOutCubic})(t);
        const tagIn   = animate({from:0, to:1, start:2.9, end:3.6, ease:Easing.easeOutCubic})(t);
        const exitOp  = animate({from:1, to:0, start:5.6, end:6.0, ease:Easing.easeInCubic})(t);
        const drift   = animate({from:1, to:1.02, start:2.6, end:6, ease:Easing.linear})(t);
        return (
          <div style={{position:"absolute", inset:0, background:C.sand, opacity:exitOp}}>
            <div style={{position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:36, transform:`scale(${drift})`}}>
              <div style={{position:"relative", width:M, height:M, transform:`scale(${pulse})`}}>
                <ChevTop size={M} color={C.teal} style={{transform:`translateY(${topY}px)`}} />
                <ChevBottom size={M} color={C.clay} style={{transform:`translateY(${botY}px)`}} />
              </div>
              <div style={{
                fontFamily:SERIF, fontWeight:600, fontSize:140, color:C.teal, lineHeight:1,
                letterSpacing:"-0.02em", opacity:wordIn, transform:`translateY(${(1-wordIn)*24}px)`,
              }}>Auxilia</div>
              <div style={{
                fontFamily:SANS, fontWeight:500, fontSize:40, color:C.inkSoft, whiteSpace:"nowrap",
                opacity:tagIn, transform:`translateY(${(1-tagIn)*18}px)`,
              }}>AI-versterking voor kmo's</div>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

/* ════ Scene 3 · Eén proces, werkend (12.5 – 21) ════ */
const procTitles = [
  {tx:"Offertes",      a:1.1, b:3.0},
  {tx:"Klantenmails",  a:3.0, b:4.9},
  {tx:"Rapportering",  a:4.9, b:8.5},
];
const procLines = [86, 68, 78, 58, 40]; // % widths
function SceneProcess(){
  return (
    <Sprite start={12.5} end={21}>
      {({localTime:t}) => {
        const bgIn   = animate({from:0, to:1, start:0,   end:0.5, ease:Easing.easeOutCubic})(t);
        const cardIn = animate({from:0, to:1, start:0.4, end:1.1, ease:Easing.easeOutCubic})(t);
        const exitOp = animate({from:1, to:0, start:8.1, end:8.5, ease:Easing.easeInCubic})(t);
        const count  = animate({from:45, to:4, start:3.0, end:5.6, ease:Easing.easeInOutQuart})(t);
        const num    = Math.round(count);
        const numTeal = count < 12;
        const numPop = 1 + 0.07 * Math.sin(clamp((t-5.6)/0.45,0,1) * Math.PI);
        const stampIn = animate({from:0, to:1, start:6.3, end:6.75, ease:Easing.easeOutBack})(t);
        const capIn  = animate({from:0, to:1, start:6.9, end:7.6, ease:Easing.easeOutCubic})(t);
        const zoom   = animate({from:1, to:1.035, start:1, end:8.5, ease:Easing.linear})(t);
        return (
          <div style={{position:"absolute", inset:0, background:C.sandDeep, opacity:bgIn*exitOp}}>
            <div style={{position:"absolute", inset:0, transform:`scale(${zoom})`, transformOrigin:"center"}}>

              {/* document card */}
              <div style={{
                position:"absolute", left:300, top:240, width:740, height:540,
                background:C.paper, borderRadius:22, boxShadow:"0 40px 80px -40px rgba(28,36,34,.35)",
                opacity:cardIn, transform:`translateY(${(1-cardIn)*40}px) scale(${0.95+0.05*cardIn})`,
                padding:"52px 56px", boxSizing:"border-box",
              }}>
                <div style={{fontFamily:SANS, fontWeight:600, fontSize:24, letterSpacing:"0.14em", color:C.clay, textTransform:"uppercase", marginBottom:14}}>Proces</div>
                <div style={{position:"relative", height:88}}>
                  {procTitles.map((p,i) => {
                    const op = animate({from:0, to:1, start:p.a, end:p.a+0.35, ease:Easing.easeOutCubic})(t)
                             * animate({from:1, to:0, start:p.b-0.3, end:p.b, ease:Easing.easeInCubic})(t);
                    return <div key={i} style={{position:"absolute", left:0, top:0, fontFamily:SERIF, fontWeight:600, fontSize:64, color:C.ink, opacity: i===procTitles.length-1 ? animate({from:0,to:1,start:p.a,end:p.a+0.35,ease:Easing.easeOutCubic})(t) : op}}>{p.tx}</div>;
                  })}
                </div>
                {procLines.map((wpct,i) => {
                  const fill = animate({from:0, to:1, start:1.4+i*0.55, end:2.1+i*0.55, ease:Easing.easeInOutCubic})(t);
                  return (
                    <div key={i} style={{height:26, borderRadius:13, background:"rgba(28,36,34,.07)", marginTop:i===0?26:24, width:`${wpct}%`, overflow:"hidden"}}>
                      <div style={{height:"100%", width:`${fill*100}%`, borderRadius:13, background:"rgba(15,92,90,.35)"}}></div>
                    </div>
                  );
                })}
                {/* stamp */}
                <div style={{
                  position:"absolute", right:44, bottom:40,
                  display:"flex", alignItems:"center", gap:14,
                  background:C.teal, borderRadius:14, padding:"16px 26px",
                  opacity:clamp(stampIn,0,1), transform:`scale(${0.4+0.6*stampIn}) rotate(${-4*(1-clamp(stampIn,0,1))-2}deg)`,
                }}>
                  <RankMark size={40} top={C.sand} bottom={C.clay} sw={8} />
                  <span style={{fontFamily:SANS, fontWeight:700, fontSize:30, color:C.sand, letterSpacing:"0.02em"}}>werkt</span>
                </div>
              </div>

              {/* time counter */}
              <div style={{position:"absolute", left:1150, top:330, width:560, opacity:cardIn}}>
                <div style={{fontFamily:SANS, fontWeight:600, fontSize:30, color:C.inkSoft, marginBottom:6}}>Tijd per dossier</div>
                <div style={{display:"flex", alignItems:"baseline", gap:18, transform:`scale(${numPop})`, transformOrigin:"left bottom"}}>
                  <span style={{fontFamily:SERIF, fontWeight:600, fontSize:240, lineHeight:1, color:numTeal?C.teal:C.ink, fontVariantNumeric:"tabular-nums", letterSpacing:"-0.03em"}}>{num}</span>
                  <span style={{fontFamily:SERIF, fontWeight:500, fontSize:72, color:C.inkSoft}}>min</span>
                </div>
                <div style={{height:5, width:200, borderRadius:3, background:C.clay, marginTop:26, transform:`scaleX(${animate({from:0,to:1,start:5.2,end:5.9,ease:Easing.easeOutCubic})(t)})`, transformOrigin:"left"}}></div>
              </div>

              {/* caption */}
              <div style={{
                position:"absolute", left:0, right:0, bottom:90, textAlign:"center",
                fontFamily:SERIF, fontWeight:500, fontSize:56, color:C.ink, letterSpacing:"-0.015em", whiteSpace:"nowrap",
                opacity:capIn, transform:`translateY(${(1-capIn)*22}px)`,
              }}>Eén proces, volledig geautomatiseerd.</div>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

/* ════ Scene 4 · De sprint (21 – 28.5) ════ */
const weekNodes = [
  {x:360,  wk:"Stap 1", lbl:"Analyse"},
  {x:760,  wk:"Stap 2", lbl:"Bouwen"},
  {x:1160, wk:"Stap 3", lbl:"Testen"},
  {x:1560, wk:"Stap 4", lbl:"Live"},
];
function SceneWeeks(){
  const Y = 580;
  return (
    <Sprite start={21} end={28.5}>
      {({localTime:t}) => {
        const baseIn = animate({from:0, to:1, start:0.3, end:1.0, ease:Easing.easeInOutCubic})(t);
        const prog   = animate({from:0, to:1, start:2.0, end:5.5, ease:Easing.easeInOutQuart})(t);
        const progX  = 360 + prog * 1200;
        const headIn = animate({from:0, to:1, start:5.8, end:6.5, ease:Easing.easeOutCubic})(t);
        const exitOp = animate({from:1, to:0, start:7.1, end:7.5, ease:Easing.easeInCubic})(t);
        const zoom   = animate({from:1.02, to:1.06, start:0, end:7.5, ease:Easing.linear})(t);
        const bob    = Math.sin(t*5) * 5;
        return (
          <div style={{position:"absolute", inset:0, background:C.sand, opacity:exitOp}}>
            <div style={{position:"absolute", inset:0, transform:`scale(${zoom})`, transformOrigin:"center"}}>
              {/* headline */}
              <div style={{
                position:"absolute", left:0, right:0, top:300, textAlign:"center",
                fontFamily:SERIF, fontWeight:500, fontSize:88, color:C.teal, letterSpacing:"-0.02em", whiteSpace:"nowrap",
                opacity:headIn, transform:`translateY(${(1-headIn)*26}px)`,
              }}>Werkend opgeleverd.</div>

              {/* base line */}
              <div style={{position:"absolute", left:360, top:Y-1, width:1200, height:2.5, background:C.line, transform:`scaleX(${baseIn})`, transformOrigin:"left"}}></div>
              {/* progress line */}
              <div style={{position:"absolute", left:360, top:Y-2.5, width:1200, height:5, borderRadius:3, background:C.clay, transform:`scaleX(${prog})`, transformOrigin:"left"}}></div>

              {/* traveling mark */}
              <div style={{position:"absolute", left:progX-30, top:Y-110+bob, opacity:prog>0.005 && prog<0.999 ? 1 : (prog>=0.999 ? 1 : 0)}}>
                <RankMark size={60} top={C.teal} bottom={C.clay} sw={8} />
              </div>

              {/* nodes */}
              {weekNodes.map((n,i) => {
                const pop = animate({from:0, to:1, start:0.6+i*0.35, end:1.05+i*0.35, ease:Easing.easeOutBack})(t);
                const reached = progX >= n.x - 4;
                return (
                  <div key={i} style={{position:"absolute", left:n.x, top:Y, transform:"translate(-50%,-50%)"}}>
                    <div style={{
                      width:64, height:64, borderRadius:"50%",
                      background:reached ? C.teal : C.sand,
                      border:`2.5px solid ${reached ? C.teal : "rgba(28,36,34,.25)"}`,
                      display:"grid", placeItems:"center",
                      transform:`scale(${clamp(pop,0,1.2) * (reached ? 1.08 : 1)})`,
                      transition:"background .25s, border-color .25s",
                      fontFamily:SERIF, fontWeight:600, fontSize:30,
                      color:reached ? C.sand : C.inkSoft,
                    }}>{i+1}</div>
                    <div style={{position:"absolute", top:84, left:"50%", transform:"translateX(-50%)", textAlign:"center", opacity:clamp(pop,0,1), width:240}}>
                      <div style={{fontFamily:SANS, fontWeight:700, fontSize:26, color:reached?C.teal:C.inkSoft, letterSpacing:"0.06em", textTransform:"uppercase"}}>{n.wk}</div>
                      <div style={{fontFamily:SANS, fontWeight:500, fontSize:30, color:C.inkSoft, marginTop:4}}>{n.lbl}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

/* ════ Scene 5 · De belofte (28.5 – 35.2, teal cover boven outro) ════ */
function ScenePromise(){
  return (
    <Sprite start={28.5} end={35.2}>
      {({localTime:t}) => {
        const wipe   = animate({from:100, to:0, start:0, end:0.7, ease:Easing.easeInOutQuart})(t);
        const l1In   = animate({from:0, to:1, start:1.0, end:1.7, ease:Easing.easeOutCubic})(t);
        const l2In   = animate({from:0, to:1, start:2.6, end:3.3, ease:Easing.easeOutCubic})(t);
        const under  = animate({from:0, to:1, start:3.5, end:4.2, ease:Easing.easeOutCubic})(t);
        const fadeOut= animate({from:1, to:0, start:6.0, end:6.7, ease:Easing.easeInOutCubic})(t);
        return (
          <div style={{position:"absolute", inset:0, zIndex:5, background:C.teal, clipPath:`inset(${wipe}% 0 0 0)`, opacity:fadeOut}}>
            <div style={{position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:30}}>
              <div style={{
                fontFamily:SERIF, fontWeight:500, fontSize:120, color:"rgba(250,247,242,.55)", letterSpacing:"-0.02em", whiteSpace:"nowrap",
                opacity:l1In, transform:`translateY(${(1-l1In)*30}px)`,
              }}>Geen uren.</div>
              <div style={{position:"relative", whiteSpace:"nowrap", opacity:l2In, transform:`translateY(${(1-l2In)*30}px)`}}>
                <span style={{fontFamily:SERIF, fontWeight:600, fontSize:150, color:C.sand, letterSpacing:"-0.02em"}}>Wel resultaat.</span>
                <div style={{position:"absolute", left:"8%", right:"8%", bottom:-18, height:8, borderRadius:4, background:C.clay, transform:`scaleX(${under})`, transformOrigin:"left"}}></div>
              </div>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

/* ════ Scene 6 · Outro (34.5 – 40) ════ */
function SceneOutro(){
  return (
    <Sprite start={34.5} end={40}>
      {({localTime:t}) => {
        const inOp  = animate({from:0, to:1, start:0.5, end:1.2, ease:Easing.easeOutCubic})(t);
        const tagIn = animate({from:0, to:1, start:1.7, end:2.4, ease:Easing.easeOutCubic})(t);
        const urlIn = animate({from:0, to:1, start:2.4, end:3.1, ease:Easing.easeOutCubic})(t);
        const drift = animate({from:1, to:1.03, start:1, end:5.5, ease:Easing.linear})(t);
        return (
          <div style={{position:"absolute", inset:0, background:C.sand}}>
            <div style={{position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:40, transform:`scale(${drift})`}}>
              <div style={{display:"flex", alignItems:"center", gap:34, whiteSpace:"nowrap", opacity:inOp, transform:`translateY(${(1-inOp)*26}px)`}}>
                <RankMark size={150} />
                <span style={{fontFamily:SERIF, fontWeight:600, fontSize:150, color:C.teal, lineHeight:1, letterSpacing:"-0.02em"}}>Auxilia</span>
              </div>
              <div style={{fontFamily:SANS, fontWeight:500, fontSize:42, color:C.inkSoft, whiteSpace:"nowrap", opacity:tagIn, transform:`translateY(${(1-tagIn)*18}px)`}}>
                AI-versterking voor kmo's. Werkend opgeleverd.
              </div>
              <div style={{
                fontFamily:SANS, fontWeight:700, fontSize:32, color:C.teal, letterSpacing:"0.02em",
                border:`2px solid rgba(15,92,90,.3)`, borderRadius:12, padding:"14px 30px",
                opacity:urlIn, transform:`translateY(${(1-urlIn)*14}px)`,
              }}>auxilia.be</div>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

/* ── timestamp label for comments ── */
function TimecodeWrapper({children}){
  const t = useTime();
  return <div data-screen-label={`t=${Math.floor(t)}s`} style={{position:"absolute", inset:0}}>{children}</div>;
}

function PromoApp(){
  const EMBED = new URLSearchParams(window.location.search).has('embed');
  const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  React.useEffect(() => {
    if (EMBED) document.body.classList.add('embed');
    // Zelfherstel: de eerste meting kan racen terwijl het iframe nog 0 hoogte
    // heeft, en de ResizeObserver ín het iframe vuurt niet altijd wanneer het
    // iframe daarna pas zijn maat krijgt. Blijf hermeten tot de werkelijk
    // gerenderde schaal aantoonbaar gezond is — geef nooit op zolang het
    // beeld ongezond is; de interval stopt pas bij een gezonde meting.
    const iv = setInterval(() => {
      const stage = document.querySelector('#root > div');
      const canvas = stage && stage.firstElementChild && stage.firstElementChild.firstElementChild;
      let sc = 0;
      try { sc = new DOMMatrixReadOnly(getComputedStyle(canvas).transform).a; } catch (e) {}
      const healthy = stage && stage.clientHeight > 100 && sc > 0.06;
      if (healthy) { clearInterval(iv); return; }
      if (stage && stage.clientHeight > 0) window.dispatchEvent(new Event('resize'));
    }, 250);
    return () => clearInterval(iv);
  }, [EMBED]);
  return (
    <Stage width={1920} height={1080} duration={40} background={C.sand} autoplay={!(EMBED && REDUCE)} persistKey={EMBED ? "auxilia-promo-embed" : "auxilia-promo"}>
      <TimecodeWrapper>
        <SceneNoise />
        <SceneMark />
        <SceneProcess />
        <SceneWeeks />
        <SceneOutro />
        <ScenePromise />
      </TimecodeWrapper>
    </Stage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<PromoApp />);
</script>
</body>
</html>
