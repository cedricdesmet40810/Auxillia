<script>
/* ── AuxiliaAudio: speelt een echt muziekbestand (promo-music.mp3) gesynct
   met de afspeelkop — play/pauze/scrub/loop volgen de film, met fade-out
   op het einde. Geen bestand aanwezig? Dan blijft de film gewoon stil.
   Uit in embed-modus (stille hero op de site). */
window.AuxiliaAudio = (function(){
  const SRC='promo-music-b.mp3';
  const VOL=0.85, FILM_END=39.54, FADE_S=1.6;
  /* start 8 beats (5.28s) in de track: drums vallen zo precies op de reveal (film 8.24s) */
  const OFFSET=5.28;
  let el=null, btn=null, enabled=false, muted=false, ready=false;
  let lastT=-1, lastAdv=0, unlocked=false;
  function targetVol(t){
    if(muted||!ready) return 0;
    const fade=Math.min(1, Math.max(0,(FILM_END-t)/FADE_S));
    return VOL*fade;
  }
  function align(t){
    if(!ready||!el.duration||!isFinite(el.duration)) return;
    const want=(t+OFFSET)%el.duration;
    if(Math.abs(el.currentTime-want)>0.35){ try{ el.currentTime=want; }catch(e){} }
  }
  function sync(t){
    if(!enabled||!el) return;
    if(t!==lastT){
      const dt=t-lastT;
      if(lastT<0||dt<0||dt>=0.5) align(t);   /* seek of loop */
      lastT=t; lastAdv=performance.now();
    }
  }
  setInterval(function(){
    if(!enabled||!el||!ready) return;
    const playing=(performance.now()-lastAdv)<350;
    if(playing){
      if(el.paused&&unlocked){ align(lastT); el.play().catch(function(){}); }
    } else if(!el.paused){ el.pause(); }
    const tv=playing?targetVol(lastT):0;
    el.volume += (tv-el.volume)*0.2;
    if(Math.abs(el.volume-tv)<0.01) el.volume=tv;
  },120);
  function unlock(){
    if(unlocked||!enabled||!el) return;
    unlocked=true;
    /* eerste gebruikersinteractie: audio-element activeren */
    const p=el.play();
    if(p&&p.then) p.then(function(){ if((performance.now()-lastAdv)>=350) el.pause(); }).catch(function(){ unlocked=false; });
  }
  function setMuted(m){
    muted=m; try{ localStorage.setItem('auxilia-promo:muted', m?'1':'0'); }catch(e){}
    if(btn) btn.classList.toggle('muted',m);
  }
  function init(opts){
    enabled=!(opts&&opts.embed); if(!enabled) return;
    try{ muted=localStorage.getItem('auxilia-promo:muted')==='1'; }catch(e){}
    el=new Audio(); el.preload='auto'; el.src=SRC; el.volume=0;
    el.addEventListener('canplaythrough',function(){
      ready=true;
      if(btn){ btn.hidden=false; btn.classList.toggle('muted',muted); }
    });
    el.addEventListener('error',function(){ enabled=false; ready=false; if(btn) btn.hidden=true; });
    btn=document.getElementById('sndBtn');
    if(btn) btn.addEventListener('click',function(){ unlock(); setMuted(!muted); });
    window.addEventListener('pointerdown',unlock,true);
    window.addEventListener('keydown',unlock,true);
  }
  return {init:init, sync:sync};
})();
</script>

<script type="text/babel">
/* ─── Auxilia promo · 40s · 1080×1920 (portret / mobiel) ──────────────────── */
const C = {
  sand:"#FAF7F2", sandDeep:"#F1EADE", paper:"#FFFFFF",
  teal:"#0F5C5A", tealDark:"#0B4543", clay:"#D2691E", claySoft:"#F4DEC8",
  ink:"#1C2422", inkSoft:"#52605C", inkFaint:"#8A968F",
  line:"rgba(28,36,34,.12)",
};
const SERIF = '"Spectral", Georgia, serif';
const SANS  = '"Hanken Grotesk", system-ui, sans-serif';

/* ── brand mark: two independently animatable chevrons ── */
function ChevTop({size, color, sw=7.2, style}){
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" style={{position:"absolute", left:0, top:0, ...style}}>
      <path d="M14 31 L32 14 L50 31" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"></path>
    </svg>
  );
}
function ChevBottom({size, color, sw=7.2, style}){
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" style={{position:"absolute", left:0, top:0, ...style}}>
      <path d="M14 50 L32 33 L50 50" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"></path>
    </svg>
  );
}
function RankMark({size=64, top=C.teal, bottom=C.clay, sw=7.2, style}){
  return (
    <div style={{position:"relative", width:size, height:size, flex:"0 0 auto", ...style}}>
      <ChevTop size={size} color={top} sw={sw} />
      <ChevBottom size={size} color={bottom} sw={sw} />
    </div>
  );
}

/* ════ Scene 1 · De ruis (0 – 6.5) ════
   Echte vragen van kmo's, verspreid over het beeld zoals op een prikbord. */
const noiseWords = [
  {tx:"Moet je iets\nmet AI?",                     x:80,   y:240, s:58, d:0.2,  o:0.9,  c:C.ink,     b:1},
  {tx:"waar moet ik\nbeginnen?",                   x:610,  y:175, s:52, d:0.55, o:0.85, c:C.clay},
  {tx:"ChatGPT, Copilot\nof Gemini?",              x:120,  y:500, s:48, d:0.9,  o:0.75, c:C.inkSoft},
  {tx:"is het geen\nhype?",                        x:680,  y:470, s:36, d:1.25, o:0.5,  c:C.inkFaint},
  {tx:"mag ik klantgegevens\nin ChatGPT plakken?", x:90,   y:720, s:40, d:1.5,  o:0.8,  c:C.ink},
  {tx:"wat kost het en\nwat brengt het op?",       x:560,  y:700, s:44, d:1.8,  o:0.85, c:C.ink,     b:1},
  {tx:"kan AI mijn offertes\nen mails doen?",       x:110,  y:960, s:40, d:2.05, o:0.65, c:C.teal},
  {tx:"vervangt AI\nmijn mensen?",                 x:630,  y:940, s:48, d:2.3,  o:0.75, c:C.inkSoft},
  {tx:"weer een tool\nerbij?",                     x:130,  y:1200, s:36, d:2.55, o:0.5,  c:C.inkFaint},
  {tx:"wat is een\nAI-agent?",                     x:640,  y:1180, s:44, d:2.8,  o:0.8,  c:C.ink},
  {tx:"kan ik de antwoorden\nwel vertrouwen?",      x:110,  y:1420, s:38, d:3.05, o:0.6,  c:C.teal},
  {tx:"wat met\nde AI Act?",                       x:640,  y:1440, s:38, d:3.3,  o:0.55, c:C.inkSoft},
];
function SceneNoise(){
  return (
    <Sprite start={0} end={8.24}>
      {({localTime:t}) => {
        const zoom = animate({from:1, to:1.05, start:0, end:8, ease:Easing.linear})(t);
        const scatter = animate({from:0, to:1, start:4.8, end:6.1, ease:Easing.easeInCubic})(t);
        const hookIn  = animate({from:0, to:1, start:5.1, end:5.7, ease:Easing.easeOutCubic})(t);
        const hook2In = animate({from:0, to:1, start:6.3, end:6.9, ease:Easing.easeOutBack})(t);
        const hookOut = animate({from:1, to:0, start:7.5, end:7.95, ease:Easing.easeInCubic})(t);
        return (
          <div style={{position:"absolute", inset:0, background:C.sand}}>
            <div style={{position:"absolute", inset:0, transform:`scale(${zoom})`, transformOrigin:"center"}}>
              {noiseWords.map((w,i) => {
                const inOp = animate({from:0, to:w.o, start:w.d, end:w.d+0.7, ease:Easing.easeOutCubic})(t);
                const drift = t * 7 * (i%2===0 ? 1 : 0.6);
                const dx = (w.x - 540) * 0.5 * scatter;
                const dy = (w.y - 960) * 0.5 * scatter;
                return (
                  <div key={i} style={{
                    position:"absolute", left:w.x, top:w.y - drift,
                    transform:`translate(${dx}px, ${dy}px) rotate(${(i%3-1)*1.5}deg)`,
                    opacity: inOp * (1 - scatter),
                    fontFamily:SERIF, fontWeight:w.b?600:500, fontSize:w.s, color:w.c,
                    whiteSpace:"pre", lineHeight:1.2,
                    textAlign:w.ctr?"center":"left",
                  }}>{w.tx}</div>
                );
              })}
            </div>
            <div style={{
              position:"absolute", left:"50%", top:"50%",
              transform:"translate(-50%,-50%)",
              display:"flex", flexDirection:"column", alignItems:"center", gap:36,
              opacity:hookOut, width:920,
            }}>
              <div style={{
                fontFamily:SERIF, fontWeight:500, fontSize:62, color:C.ink,
                letterSpacing:"-0.02em", textAlign:"center", lineHeight:1.18,
                opacity:hookIn, transform:`translateY(${(1-hookIn)*26}px)`,
              }}>Iedereen zegt dat je <em style={{fontStyle:"normal", color:C.teal}}>iets met AI</em> moet.</div>
              <div style={{
                fontFamily:SERIF, fontWeight:600, fontSize:120, color:C.clay,
                letterSpacing:"-0.02em", whiteSpace:"nowrap",
                opacity:clamp(hook2In,0,1), transform:`translateY(${(1-clamp(hook2In,0,1))*30}px) scale(${0.7+0.3*hook2In})`,
              }}>Maar wat?</div>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

/* ════ Scene 2 · Het antwoord: Auxilia (8 – 15) — teal reveal ════ */
function SceneMark(){
  const M = 260;
  return (
    <Sprite start={8.24} end={14.84}>
      {({localTime:t}) => {
        const wipe   = animate({from:100, to:0, start:0, end:0.7, ease:Easing.easeInOutQuart})(t);
        const topY   = animate({from:-480, to:0, start:0.5, end:1.3, ease:Easing.easeOutCubic})(t);
        const botY   = animate({from: 480, to:0, start:0.8, end:1.65, ease:Easing.easeOutBack})(t);
        const pulse  = 1 + 0.05 * Math.sin(clamp((t-1.65)/0.5,0,1) * Math.PI);
        const wordIn = animate({from:0, to:1, start:2.0, end:2.7, ease:Easing.easeOutCubic})(t);
        const tagIn  = animate({from:0, to:1, start:3.0, end:3.7, ease:Easing.easeOutCubic})(t);
        const ansIn  = animate({from:0, to:1, start:4.2, end:4.9, ease:Easing.easeOutCubic})(t);
        const exitOp = animate({from:1, to:0, start:6.5, end:7.0, ease:Easing.easeInCubic})(t);
        const drift  = animate({from:1, to:1.02, start:2.7, end:7, ease:Easing.linear})(t);
        return (
          <div style={{position:"absolute", inset:0, background:C.teal, clipPath:`inset(${wipe}% 0 0 0)`, opacity:exitOp}}>
            <div style={{position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:32, transform:`scale(${drift})`}}>
              <div style={{position:"relative", width:M, height:M, transform:`scale(${pulse})`}}>
                <ChevTop size={M} color={C.sand} style={{transform:`translateY(${topY}px)`}} />
                <ChevBottom size={M} color={C.clay} style={{transform:`translateY(${botY}px)`}} />
              </div>
              <div style={{
                fontFamily:SERIF, fontWeight:600, fontSize:140, color:C.sand, lineHeight:1,
                letterSpacing:"-0.02em", opacity:wordIn, transform:`translateY(${(1-wordIn)*24}px)`,
              }}>Auxilia</div>
              <div style={{
                fontFamily:SANS, fontWeight:500, fontSize:40, color:"rgba(250,247,242,.75)", whiteSpace:"nowrap",
                opacity:tagIn, transform:`translateY(${(1-tagIn)*18}px)`,
              }}>AI-versterking voor kmo's</div>
              <div style={{
                fontFamily:SERIF, fontWeight:500, fontSize:42, color:C.sand, marginTop:6, width:760,
                textAlign:"center", lineHeight:1.22,
                opacity:ansIn, transform:`translateY(${(1-ansIn)*18}px)`,
              }}>Wij zoeken uit wát — en bouwen het voor je.</div>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

/* ════ Scene 3 · Dit nemen we van je over (15 – 24) ════ */
const moreRows = [
  {d:1.0,  nm:"Offertes",          st:"opgemaakt",   ic:<path d="M6 3.5h8l4 4v13H6v-17zM14 3.5V8h4M9 12h6M9 15.5h6" strokeLinecap="round" strokeLinejoin="round"/>},
  {d:1.2, nm:"Klantenmails",      st:"beantwoord",  ic:<path d="M3.5 6.5h17v11h-17v-11zM3.5 7l8.5 6 8.5-6" strokeLinejoin="round"/>},
  {d:1.6,  nm:"Maandrapportering", st:"gegenereerd", ic:<path d="M5 19V10M10.5 19V5M16 19v-7M21 19H3.5" strokeLinecap="round"/>},
  {d:2.0, nm:"Administratie",     st:"bijgewerkt",  ic:<path d="M4 7.5h6l2 2.5h8v8.5h-16v-11zM4 7.5V18" strokeLinejoin="round"/>},
  {d:2.4,  nm:"Facturatie",        st:"opgevolgd",   ic:<path d="M7 3.5h10v17l-2.5-1.5-2.5 1.5-2.5-1.5L7 20.5v-17zM10 8h4M10 12h4" strokeLinecap="round" strokeLinejoin="round"/>},
  {d:2.8, nm:"Planning",          st:"ingepland",   ic:<path d="M4.5 6h15v14h-15V6zM4.5 10h15M8.5 3.5V7M15.5 3.5V7" strokeLinecap="round" strokeLinejoin="round"/>},
];
function SceneMore(){
  return (
    <Sprite start={14.84} end={20.12}>
      {({localTime:t}) => {
        const headIn = animate({from:0, to:1, start:0.3, end:1.0, ease:Easing.easeOutCubic})(t);

                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><path d="M5 13l4 4L19 7" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </span>
                      <span style={{fontFamily:SANS, fontWeight:600, fontSize:32, color:C.teal}}>{r.st}</span>

/* ════ Scene 4 · De sprint (24 – 31.5) — verticaal voor mobiel ════ */
const weekNodes = [
  {y:780,  wk:"Stap 1", lbl:"Analyse"},
  {y:1060, wk:"Stap 2", lbl:"Bouwen"},
  {y:1340, wk:"Stap 3", lbl:"Testen"},
  {y:1620, wk:"Stap 4", lbl:"Live"},
];
function SceneWeeks(){
  const X = 250, Y0 = 780, Y1 = 1620, SPAN = Y1 - Y0;
  return (
    <Sprite start={20.12} end={27.38}>
      {({localTime:t}) => {
        const baseIn = animate({from:0, to:1, start:0.3, end:1.0, ease:Easing.easeInOutCubic})(t);
        const prog   = animate({from:0, to:1, start:2.0, end:5.5, ease:Easing.easeInOutQuart})(t);
        const progY  = Y0 + prog * SPAN;
        const headIn = animate({from:0, to:1, start:5.8, end:6.5, ease:Easing.easeOutCubic})(t);
        const exitOp = animate({from:1, to:0, start:7.1, end:7.5, ease:Easing.easeInCubic})(t);
        const zoom   = animate({from:1.02, to:1.05, start:0, end:7.5, ease:Easing.linear})(t);
        const bob    = Math.sin(t*5) * 5;
        return (
          <div style={{position:"absolute", inset:0, background:C.sand, opacity:exitOp}}>
            <div style={{position:"absolute", inset:0, transform:`scale(${zoom})`, transformOrigin:"center"}}>
              {/* headline */}
              <div style={{
                position:"absolute", left:90, right:90, top:300, textAlign:"center",
                fontFamily:SERIF, fontWeight:500, fontSize:66, color:C.teal, letterSpacing:"-0.02em", lineHeight:1.18,
                opacity:headIn, transform:`translateY(${(1-headIn)*26}px)`,
              }}>Wij bouwen het. Wij leiden je team op.</div>

              {/* base line */}
              <div style={{position:"absolute", left:X-1.5, top:Y0, width:3, height:SPAN, background:C.line, transform:`scaleY(${baseIn})`, transformOrigin:"top"}}></div>
              {/* progress line */}
              <div style={{position:"absolute", left:X-3, top:Y0, width:6, height:SPAN, borderRadius:3, background:C.clay, transform:`scaleY(${prog})`, transformOrigin:"top"}}></div>

              {/* traveling mark */}
              <div style={{position:"absolute", left:X-122, top:progY-32+bob, opacity:prog>0.005 ? 1 : 0}}>
                <RankMark size={64} top={C.teal} bottom={C.clay} sw={8} />
              </div>

              {/* nodes */}
              {weekNodes.map((n,i) => {
                const pop = animate({from:0, to:1, start:0.6+i*0.35, end:1.05+i*0.35, ease:Easing.easeOutBack})(t);
                const reached = progY >= n.y - 4;
                return (
                  <div key={i} style={{position:"absolute", left:X, top:n.y, transform:"translate(-50%,-50%)"}}>
                    <div style={{
                      width:84, height:84, borderRadius:"50%",
                      background:reached ? C.teal : C.sand,
                      border:`3px solid ${reached ? C.teal : "rgba(28,36,34,.25)"}`,
                      display:"grid", placeItems:"center",
                      transform:`scale(${clamp(pop,0,1.2) * (reached ? 1.08 : 1)})`,
                      transition:"background .25s, border-color .25s",
                      fontFamily:SERIF, fontWeight:600, fontSize:40,
                      color:reached ? C.sand : C.inkSoft,
                    }}>{i+1}</div>
                    <div style={{position:"absolute", left:118, top:"50%", transform:"translateY(-50%)", opacity:clamp(pop,0,1), width:600}}>
                      <div style={{fontFamily:SANS, fontWeight:700, fontSize:30, color:reached?C.teal:C.inkSoft, letterSpacing:"0.06em", textTransform:"uppercase"}}>{n.wk}</div>
                      <div style={{fontFamily:SANS, fontWeight:500, fontSize:46, color:C.ink, marginTop:4}}>{n.lbl}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

/* ════ Scene 5 · De belofte (31.5 – 38.2, teal cover boven outro) ════ */
function ScenePromise(){

    <Sprite start={27.38} end={34.08}>

              <div style={{position:"relative", whiteSpace:"nowrap", opacity:l2In, transform:`translateY(${(1-l2In)*30}px)`}}>

                <div style={{position:"absolute", left:"6%", right:"6%", bottom:-16, height:8, borderRadius:4, background:C.clay, transform:`scaleX(${under})`, transformOrigin:"left"}}></div>

/* ════ Scene 6 · Outro (37.5 – 43.5) ════ */
function SceneOutro(){

      {({localTime:t}) => {

              <div style={{display:"flex", alignItems:"center", gap:30, whiteSpace:"nowrap", opacity:inOp, transform:`translateY(${(1-inOp)*26}px)`}}>

/* ── timestamp label for comments ── */
function TimecodeWrapper({children}){
  const t = useTime();
  return <div data-screen-label={`t=${Math.floor(t)}s`} style={{position:"absolute", inset:0}}>{children}</div>;
}

/* ── koppelt de afspeelkop aan de soundtrack ── */
function SoundSync(){
  const t = useTime();
  React.useEffect(() => { if (window.AuxiliaAudio) window.AuxiliaAudio.sync(t); }, [t]);
  return null;
}

/* ── geeft de MP4-exporter controle over de afspeelkop ── */
function ExportBridge(){
  const tl = useTimeline();
  React.useEffect(() => { window.__tl = tl; });
  return null;
}

function PromoApp(){
  const EMBED = new URLSearchParams(window.location.search).has('embed');
  const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  React.useEffect(() => {
    if (EMBED) document.body.classList.add('embed');
    if (window.AuxiliaAudio) window.AuxiliaAudio.init({embed: EMBED});
    // Zelfherstel: de eerste meting kan racen terwijl het iframe nog 0 hoogte
    // heeft, en de ResizeObserver ín het iframe vuurt niet altijd wanneer het
    // iframe daarna pas zijn maat krijgt. Blijf hermeten tot de werkelijk
    // gerenderde schaal aantoonbaar gezond is — geef nooit op zolang het
    // beeld ongezond is; de interval stopt pas bij een gezonde meting.
    const iv = setInterval(() => {
      const stage = document.querySelector('#root > div');
      const canvas = stage && stage.firstElementChild && stage.firstElementChild.firstElementChild;
      let sc = 0;
      try { sc = new DOMMatrixReadOnly(getComputedStyle(canvas).transform).a; } catch (e) {}
      const healthy = stage && stage.clientHeight > 100 && sc > 0.06;
      if (healthy) { clearInterval(iv); return; }
      if (stage && stage.clientHeight > 0) window.dispatchEvent(new Event('resize'));
    }, 250);
    return () => clearInterval(iv);
  }, [EMBED]);
  return (
    <Stage width={1080} height={1920} duration={39.54} background={C.sand} autoplay={!(EMBED && REDUCE)} persistKey={EMBED ? "auxilia-promo-embed" : "auxilia-promo"}>
      <TimecodeWrapper>
        <SoundSync />
        <ExportBridge />
        <SceneNoise />
        <SceneMark />
        <SceneMore />
        <SceneWeeks />
        <SceneOutro />
        <ScenePromise />
      </TimecodeWrapper>
    </Stage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<PromoApp />);
</script>
<script>
/* ── MP4-export: rendert de film frame-voor-frame naar 1080p MP4 met muziek.
   Werkt in Chrome/Edge (WebCodecs). Deterministisch — geen schermopname. */
(function(){
  const FPS=30, W=1080, H=1920, DUR=39.54, MUSIC='promo-music-b.mp3', MUSIC_OFFSET=5.28, MUSIC_VOL=0.85, FADE_S=1.6;
  let busy=false, cancelled=false;
  const $=function(id){ return document.getElementById(id); };
  function loadScript(src){
    return new Promise(function(res,rej){
      const s=document.createElement('script'); s.src=src;
      s.onload=res; s.onerror=function(){ rej(new Error('kon '+src+' niet laden')); };
      document.head.appendChild(s);
    });
  }
  function status(txt,frac){
    $('expStatus').textContent=txt;
    if(frac!=null) $('expBarFill').style.width=(frac*100).toFixed(1)+'%';
  }
  function nextPaint(){
    return new Promise(function(res){ requestAnimationFrame(function(){ requestAnimationFrame(res); }); });
  }
  async function renderAudio(){
    const resp=await fetch(MUSIC); if(!resp.ok) return null;
    const raw=await resp.arrayBuffer();
    const AC=window.OfflineAudioContext||window.webkitOfflineAudioContext;
    const probe=new AC(2,48000,48000);
    const buf=await probe.decodeAudioData(raw);
    const len=Math.ceil(48000*DUR);
    const oc=new AC(2,len,48000);
    const src=oc.createBufferSource(); src.buffer=buf;
    const g=oc.createGain();
    g.gain.setValueAtTime(MUSIC_VOL,0);
    g.gain.setValueAtTime(MUSIC_VOL,Math.max(0,DUR-FADE_S));
    g.gain.linearRampToValueAtTime(0,DUR);
    src.connect(g); g.connect(oc.destination);
    src.start(0,MUSIC_OFFSET);
    return oc.startRendering();
  }
  async function start(){
    if(busy) return; busy=true; cancelled=false;
    const overlay=$('expOverlay'); overlay.classList.add('show');
    const tl=window.__tl;
    const t0=tl?tl.time:0;
    try{
      if(!('VideoEncoder' in window)) throw new Error('Deze browser ondersteunt geen video-export. Gebruik Chrome of Edge.');
      status('Bibliotheken laden…',0);
      if(!window.htmlToImage) await loadScript('https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js');
      if(!window.Mp4Muxer) await loadScript('https://cdn.jsdelivr.net/npm/mp4-muxer@5.2.2/build/mp4-muxer.min.js');
      tl.setPlaying(false);
      const stageNode=document.querySelector('[data-screen-label]').parentElement;
      status('Lettertypes voorbereiden…',0);
      const fontCSS=await htmlToImage.getFontEmbedCSS(stageNode);
      const muxer=new Mp4Muxer.Muxer({
        target:new Mp4Muxer.ArrayBufferTarget(),
        video:{codec:'avc',width:W,height:H},
        audio:{codec:'aac',sampleRate:48000,numberOfChannels:2},
        fastStart:'in-memory',
      });
      const venc=new VideoEncoder({
        output:function(chunk,meta){ muxer.addVideoChunk(chunk,meta); },
        error:function(e){ console.error(e); },
      });
      venc.configure({codec:'avc1.640028',width:W,height:H,bitrate:9000000,framerate:FPS});
      /* audio eerst (snel) */
      status('Muziek renderen…',0);
      const abuf=await renderAudio();
      if(abuf){
        const aenc=new AudioEncoder({
          output:function(chunk,meta){ muxer.addAudioChunk(chunk,meta); },
          error:function(e){ console.error(e); },
        });
        aenc.configure({codec:'mp4a.40.2',sampleRate:48000,numberOfChannels:2,bitrate:160000});
        const CH=4800; /* 0.1s per AudioData */
        const L=abuf.length;
        const c0=abuf.getChannelData(0), c1=abuf.getChannelData(1);
        for(let off=0;off<L;off+=CH){
          const n=Math.min(CH,L-off);
          const data=new Float32Array(n*2);
          data.set(c0.subarray(off,off+n),0);
          data.set(c1.subarray(off,off+n),n);
          aenc.encode(new AudioData({format:'f32-planar',sampleRate:48000,numberOfFrames:n,numberOfChannels:2,timestamp:Math.round(off/48000*1e6),data:data}));
        }
        await aenc.flush(); aenc.close();
      }
      /* video frame-voor-frame */
      const total=Math.ceil(DUR*FPS);
      const draw=document.createElement('canvas'); draw.width=W; draw.height=H;
      const dctx=draw.getContext('2d');
      for(let i=0;i<total;i++){
        if(cancelled) throw new Error('__cancel');
        const t=Math.min(i/FPS,DUR-0.001);
        tl.setTime(t);
        await nextPaint();
        const cap=await htmlToImage.toCanvas(stageNode,{width:W,height:H,canvasWidth:W,canvasHeight:H,pixelRatio:1,style:{transform:'none'},fontEmbedCSS:fontCSS,backgroundColor:'#FAF7F2'});
        dctx.clearRect(0,0,W,H); dctx.drawImage(cap,0,0,W,H);
        const frame=new VideoFrame(draw,{timestamp:Math.round(i/FPS*1e6),duration:Math.round(1e6/FPS)});
        venc.encode(frame,{keyFrame:i%60===0});
        frame.close();
        if(venc.encodeQueueSize>4) await venc.flush();
        status('Frame '+(i+1)+' / '+total,(i+1)/total);
      }
      status('Bestand samenstellen…',1);
      await venc.flush(); venc.close();
      muxer.finalize();
      const blob=new Blob([muxer.target.buffer],{type:'video/mp4'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob); a.download='auxilia-promo-mobile.mp4';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){ URL.revokeObjectURL(a.href); },10000);
      status('Klaar — download gestart',1);
      setTimeout(function(){ overlay.classList.remove('show'); },1400);
    }catch(e){
      overlay.classList.remove('show');
      if(e.message!=='__cancel') alert('Export mislukt: '+e.message);
    }finally{
      if(window.__tl) window.__tl.setTime(t0);
      busy=false;
    }
  }
  window.addEventListener('DOMContentLoaded',function(){
    const b=$('expBtn'); if(b) b.addEventListener('click',start);
    const c=$('expCancel'); if(c) c.addEventListener('click',function(){ cancelled=true; });
  });
})();
</script>
